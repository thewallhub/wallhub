<!DOCTYPE html>
<html>
<head>
  <title>Contact - WallHub</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="page-logo">
  <img src="../assets/logo.png">
  <h2>WallHub</h2>
</div>

<div class="page-container">

  <h1>Contact</h1>

  <!-- TOP INFO -->
  <div class="contact-info">
    Need help or have suggestions? We're here for you.  
    Feel free to reach out anytime we’ll try our best to respond quickly.
  </div>

  <!-- FORM -->
  <form action="https://formspree.io/f/mwvabrgg" method="POST" class="contact-form">

    <input type="text" name="name" placeholder="Your Name" required>

    <input type="email" name="email" placeholder="Your Email" required>

    <textarea name="message" placeholder="Your Message" rows="5" required></textarea>

    <button type="submit">Send Message</button>

  </form>

  <!-- EXTRA SUPPORT INFO -->
  <div class="contact-extra">

    <p>We usually reply within 24–48 hours.</p>

    <a href="../index.html">← Back to Home</a>

  </div>

</div>

</body>
</html>
